  <main class="wrap">
    <section class="top-controls">
      <div class="grid">
        <div class="field">
          <label>Tipo de coffee</label>
          <select id="tipoEvento" onchange="mudarTipoEvento()">
            <option>Coffee-break Simples</option>
            <option>Coffee-break tipo Brunch</option>
            <option>Coquetel</option>
            <option>Almoço/Jantar Estilo Finger-Food</option>
          </select>
        </div>
        <div class="field">
          <label>Responsável pelo evento</label>
          <input type="text" id="responsavelEvento" placeholder="Digite o nome do responsável">
        </div>
        <div class="field">
          <label>Quantidade de pessoas</label>
          <input type="number" id="pessoas" value="45" min="1" onchange="atualizarRegrasDinamicas()">
        </div>
      </div>
    </section>

    <div id="sectionsContainer"></div>

    <div class="extra-grid">
      <section class="box">
        <h3>Tipo de louça</h3>
        <div class="choice-row" id="loucaGroup"></div>
      </section>

      <section class="box">
        <h3>Copos e xícaras</h3>
        <div class="choice-row" id="coposGroup"></div>
      </section>
    </div>

    <section class="summary">
      <h3>Resumo do pedido</h3>
      <div class="field" style="margin-bottom:16px;">
        <label for="observacoesEvento">Observações do evento</label>
        <textarea id="observacoesEvento" placeholder="Digite aqui alguma observação para o evento..." style="min-height:110px;font-family:Montserrat,Arial,sans-serif;resize:vertical;"></textarea>
      </div>
      <div class="summary-box vazio" id="resumo"></div>
      <button class="btn" id="btnGerarResumo" onclick="gerarResumo()">Gerar resumo</button>
      <div id="validacaoResumo"></div>
    </section>

    <section class="selected-gallery">
      <h3>Itens selecionados para o coffee</h3>
      <div id="galleryContent" class="muted">Após gerar o resumo, os cards com imagens dos itens selecionados aparecerão aqui.</div>
      <button class="btn btn-secondary btn-hidden" id="btnEnviarPedido" onclick="enviarPedido()">Enviar o pedido</button>
    </section>

    <section class="rules-box" style="margin-top:26px;">
      <h3>Regras do cardápio</h3>
      <div id="regrasDinamicas"></div>
    </section>

    function slug(texto){
      return texto.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');

    function getCategoriaVisual(item, secao){
      const nome = item.toLowerCase();

      const bebidas = [

      ];

      const aperitivos = [
        'pão crocante baguete com geléia frutas',
        'torrada com patê de alho poró',
        'torrada com paté de alho poró',
        'torrada com patê de azeitonas'
      ];

      if (bebidas.includes(nome)) return 'bebidas';
      if (doces.includes(nome)) return 'doces';
      if (secao === 'Coquetel' && aperitivos.includes(nome)) return 'aperitivos';
      return 'salgados';
    }

    function getTituloCategoria(secao, categoria){

      }

      if (secao === 'Coffee-break tipo Brunch') {
        if (categoria === 'salgados') return 'Salgados (4 tipos)';
        if (categoria === 'doces') return 'Doces (3 tipos)';
        if (categoria === 'bebidas') return 'Bebidas (até 4 tipos)';
      }

      if (secao === 'Coquetel') {
        if (categoria === 'salgados') return 'Salgados (até 4 tipos)';
        if (categoria === 'doces') return 'Doces (até 3 tipos ou 2 doces e 1 fruta)';
        if (categoria === 'aperitivos') return 'Aperitivos (até 2 tipos)';
        if (categoria === 'bebidas') return 'Bebidas';
      }

      if (secao === 'Almoço/Jantar Estilo Finger-Food') {
        if (categoria === 'salgados') return 'Salgados';
        if (categoria === 'doces') return 'Doces (até 2 tipos ou 1 doce e 1 fruta)';
        if (categoria === 'bebidas') return 'Bebidas (até 3 tipos)';
      }

      return 'Selecione os itens desta categoria';

    function montarSecoes(){
      const container = document.getElementById('sectionsContainer');

      container.innerHTML = Object.keys(configuracoes).map(secao => {
        const cfg = configuracoes[secao];

        const substituicaoHtml = secao === 'Coffee-break Simples' ? `
          <div class="special-box">
            <h4>Escolha 1 opção principal</h4>
            <div class="special-options">
              ${cfg.specialSubstitute.map(item => `
                <label class="item-card" id="card-${slug(secao)}-${slug(item)}">
                  <input type="radio" name="substituicao-simples" onchange="selecionarSubstituicao('${item.replace(/'/g,"\\'")}')" ${item === 'Mini pão de queijo' ? 'checked' : ''}>
                  <img class="item-thumb" src="${getImageForItem(item)}" alt="${item}">
                  <div><div class="item-name">${item}</div><div class="item-meta">Marque 1 opção</div></div>
                </label>
              `).join('')}
            </div>
          </div>` : '';

        const itensSalgados = cfg.items.filter(item => getCategoriaVisual(item, secao) === 'salgados');
        const itensDoces = cfg.items.filter(item => getCategoriaVisual(item, secao) === 'doces');
        const itensAperitivos = cfg.items.filter(item => getCategoriaVisual(item, secao) === 'aperitivos');
        const itensBebidas = cfg.items.filter(item => getCategoriaVisual(item, secao) === 'bebidas');

        const renderItens = (lista, secaoNome) => lista.map(item => `
          <label class="item-card" id="card-${slug(secaoNome)}-${slug(item)}">
            <input type="checkbox" onchange="toggleItem('${secaoNome.replace(/'/g,"\\'")}', '${item.replace(/'/g,"\\'")}', this)">
            <img class="item-thumb" src="${getImageForItem(item)}" alt="${item}">
            <div>
              <div class="item-name">${item}</div>
              <div class="item-meta">Clique para marcar este item</div>
            </div>
          </label>
        `).join('');

        return `
          <section class="section" data-section="${secao}">
            <div class="section-title">${secao}<span class="section-subtitle">${cfg.observacao}</span></div>
            <div class="section-body">
              <img class="board-image ${secao === 'Coquetel' ? 'coquetel-ajustada' : ''}" src="${imagemSecao[secao]}" alt="${secao}">
              <div class="options">
                ${secao === 'Coffee-break Simples' ? '' : `
                  <h3>Selecione os itens</h3>
                  <p class="note">Cada item recebe um tique dentro da caixa de seleção.</p>
                `}

                ${substituicaoHtml}

                ${itensSalgados.length ? `
                  <div class="special-box" style="margin:0 0 18px;">
                    <h4>${getTituloCategoria(secao, 'salgados')}</h4>
                    <p class="note" style="margin:0;color:#214e78;">Selecione os itens desta categoria</p>
                  </div>
                  <div class="option-list" style="margin-bottom:18px;">
                    ${renderItens(itensSalgados, secao)}
                  </div>
                ` : ''}

                ${itensDoces.length ? `
                  <div class="special-box" style="margin:0 0 18px;">
                    <h4>${getTituloCategoria(secao, 'doces')}</h4>
                    <p class="note" style="margin:0;color:#214e78;">Selecione os itens desta categoria</p>
                  </div>
                  <div class="option-list" style="margin-bottom:18px;">
                    ${renderItens(itensDoces, secao)}
                  </div>
                ` : ''}

                ${itensAperitivos.length ? `
                  <div class="special-box" style="margin:0 0 18px;">
                    <h4>${getTituloCategoria(secao, 'aperitivos')}</h4>
                    <p class="note" style="margin:0;color:#214e78;">Selecione os itens desta categoria</p>
                  </div>
                  <div class="option-list" style="margin-bottom:18px;">
                    ${renderItens(itensAperitivos, secao)}
                  </div>
                ` : ''}

                ${itensBebidas.length ? `
                  <div class="special-box" style="margin:0 0 18px;">
                    <h4>${getTituloCategoria(secao, 'bebidas')}</h4>
                    <p class="note" style="margin:0;color:#214e78;">Selecione os itens desta categoria</p>
                  </div>
                  <div class="option-list">
                    ${renderItens(itensBebidas, secao)}
                  </div>
                ` : ''}
              </div>
            </div>
          </section>`;
      }).join('');

      destacarSubstituicao();
    }

    function selecionarSubstituicao(item){
      pedido.substituicaoSimples = item;
      destacarSubstituicao();
    }

    function destacarSubstituicao(){
      ['Mini pão de queijo','Lanche de metro','Pão brioche'].forEach(item => {
        const card = document.getElementById(`card-${slug('Coffee-break Simples')}-${slug(item)}`);
        if(card) card.classList.toggle('active', pedido.substituicaoSimples === item);
      });
    }

    function toggleItem(secao, item, checkbox){
      const lista = pedido.itens[secao] || [];
      const card = document.getElementById(`card-${slug(secao)}-${slug(item)}`);
      if(checkbox.checked){
        if(!lista.includes(item)) lista.push(item);
        card.classList.add('active');
      } else {
        pedido.itens[secao] = lista.filter(i => i !== item);
        card.classList.remove('active');
      }
      atualizarRegrasDinamicas();
    }

    function limparSelecoesVisuais(){
      document.querySelectorAll('.item-card input[type="checkbox"]').forEach(input => input.checked = false);
      document.querySelectorAll('.item-card').forEach(card => card.classList.remove('active'));
      document.getElementById('observacoesEvento').value = '';
      document.getElementById('resumo').innerHTML = '';
      document.getElementById('resumo').classList.add('vazio');
      document.getElementById('validacaoResumo').innerHTML = '';
      document.getElementById('galleryContent').innerHTML = 'Após gerar o resumo, os cards com imagens dos itens selecionados aparecerão aqui.';
      document.getElementById('btnEnviarPedido').classList.add('btn-hidden');
      document.getElementById('btnGerarResumo').classList.remove('btn-hidden');
      destacarSubstituicao();
    }

    function resetarPedidoDoTipo(){
      pedido.louca = [];
      pedido.copos = [];
      pedido.substituicaoSimples = 'Mini pão de queijo';
      pedido.itens = {
        'Coffee-break Simples': [],
        'Coffee-break tipo Brunch': [],
        'Coquetel': [],
        'Almoço/Jantar Estilo Finger-Food': []
      };
      limparSelecoesVisuais();
    }

    function getLimiteEscolhas(tipo){
      const evento = document.getElementById('tipoEvento').value;
      if(tipo === 'louca') return 2;
      if(tipo === 'copos') return evento === 'Coquetel' ? 3 : 2;
      return 1;
    }

    function renderChoices(groupId, opcoes, tipo){
      const group = document.getElementById(groupId);
      group.innerHTML = opcoes.map(op => {
        const ativo = tipo === 'copos'
          ? pedido.copos.includes(op)
          : tipo === 'louca'
            ? pedido.louca.includes(op)
            : pedido[tipo] === op;
        return `<div class="choice ${ativo ? 'active' : ''}" onclick="selecionarEscolha('${tipo}','${op.replace(/'/g,"\\'")}',this)">${op}</div>`;
      }).join('');
    }

    function selecionarEscolha(tipo, valor, el){
      if(tipo === 'copos' || tipo === 'louca'){
        const campo = tipo === 'copos' ? 'copos' : 'louca';
        const selecionados = pedido[campo];
        const jaSelecionado = selecionados.includes(valor);

        if(jaSelecionado){
          pedido[campo] = selecionados.filter(item => item !== valor);
          el.classList.remove('active');
          return;
        }

        const limite = getLimiteEscolhas(tipo);
        if(selecionados.length >= limite){
          const nomeCampo = tipo === 'copos' ? 'Copos e xícaras' : 'Tipo de louça';
          alert(`Em ${nomeCampo} você pode selecionar no máximo ${limite} opções.`);
          return;
        }

        pedido[campo].push(valor);
        el.classList.add('active');
        return;
      }

      el.parentElement.querySelectorAll('.choice').forEach(item=>item.classList.remove('active'));
      el.classList.add('active');
      pedido[tipo] = valor;
    }

    function mudarTipoEvento(){
      const tipo = document.getElementById('tipoEvento').value;
      resetarPedidoDoTipo();
      document.querySelectorAll('.section').forEach(sec => sec.classList.toggle('hidden', sec.dataset.section !== tipo));
      const cfg = configuracoes[tipo];
      renderChoices('loucaGroup', cfg.loucas, 'louca');
      renderChoices('coposGroup', cfg.copos, 'copos');
      atualizarRegrasDinamicas();
    }

    function contarItens(lista, universo){
      return lista.filter(item => universo.includes(item)).length;
    }

    function validarTipo(tipo, pessoas){
      const itens = pedido.itens[tipo] || [];
      const avisos = [];
      const totalPessoas = Number(pessoas) || 0;

      if(tipo === 'Coffee-break Simples'){
        const bolos = contarItens(itens, categorias.doces.filter(i => i.startsWith('Bolo')));
        const bebidas = contarItens(itens, categorias.bebidas);
        const minimoBolos = Math.max(1, Math.ceil(totalPessoas / 10));

        if(!pedido.substituicaoSimples) avisos.push('Escolha a opção principal: Mini pão de queijo, Lanche de metro ou Pão brioche.');
        if(bolos < minimoBolos) avisos.push(`Faltam ${minimoBolos - bolos} bolo(s) para completar a regra de 1 bolo a cada 10 pessoas.`);
        if(bebidas < 3) avisos.push(`Faltam ${3 - bebidas} bebida(s) para completar as 3 bebidas obrigatórias.`);
        if(bebidas > 3) avisos.push('No Coffee-break Simples, selecione exatamente 3 bebidas.');
      }

      if(tipo === 'Coffee-break tipo Brunch'){
        const salgados = contarItens(itens, categorias.salgados);
        const doces = contarItens(itens, categorias.doces);
        const bebidas = contarItens(itens, categorias.bebidas);

        if(salgados < 4) avisos.push(`Faltam ${4 - salgados} tipo(s) de salgado para completar os 4 obrigatórios.`);
        if(salgados > 4) avisos.push('Brunch exige exatamente 4 tipos de salgados.');

        if(doces < 3) avisos.push(`Faltam ${3 - doces} tipo(s) de doce para completar os 3 obrigatórios.`);
        if(doces > 3) avisos.push('Brunch exige exatamente 3 tipos de doces.');

        if(bebidas < 1) avisos.push('Brunch exige pelo menos 1 bebida.');
        if(bebidas > 4) avisos.push('Brunch permite até 4 tipos de bebidas.');
      }

      if(tipo === 'Coquetel'){
        const salgados = contarItens(itens, categorias.salgados);
        const minilanches = contarItens(itens, categorias.minilanches);
        const tabua = contarItens(itens, categorias.tabua);
        const doces = contarItens(itens, categorias.doces);
        const frutas = contarItens(itens, categorias.frutas);

        if(salgados > 4) avisos.push('Coquetel permite até 4 tipos de salgados.');
        else if(salgados < 1) avisos.push('Selecione pelo menos 1 tipo de salgado no Coquetel.');

        if(minilanches > 3) avisos.push('Coquetel permite até 3 minilanches.');

        if(tabua > 2) avisos.push('Coquetel permite até 2 itens de aperitivos.');
        else if(tabua < 1) avisos.push('Selecione pelo menos 1 item em aperitivos.');

        if(doces > 3) avisos.push('Coquetel permite até 3 tipos de doces.');
        else if(doces < 1 && frutas < 1) avisos.push('Selecione pelo menos 1 doce ou fruta no Coquetel.');

        if(frutas > 1) avisos.push('Coquetel permite no máximo 1 fruta.');
        if(frutas > 0 && doces > 2) avisos.push('Se houver fruta no Coquetel, use no máximo 2 doces e 1 fruta.');
      }

      if(tipo === 'Almoço/Jantar Estilo Finger-Food'){
        const pratosQuentes = contarItens(itens, categorias.pratosQuentes);
        const saladas = contarItens(itens, categorias.saladas);
        const carnes = contarItens(itens, categorias.carnes);
        const salgados = contarItens(itens, ['Coxinha/Risoles/Bolinha queijo']);
        const doces = contarItens(itens, categorias.doces);
        const frutas = contarItens(itens, categorias.frutas);
        const bebidas = contarItens(itens, categorias.bebidas);

        if(pratosQuentes > 2) avisos.push('Finger-Food permite até 2 tipos de pratos quentes.');
        else if(pratosQuentes < 1) avisos.push('Selecione pelo menos 1 prato quente.');

        if(saladas > 1) avisos.push('Finger-Food permite 1 tipo de salada.');
        if(carnes > 2) avisos.push('Finger-Food permite até 2 tipos de carnes.');
        if(salgados > 1) avisos.push('Finger-Food permite 1 tipo de salgado.');
        if(doces > 2) avisos.push('Finger-Food permite até 2 tipos de doces.');
        if(frutas > 1) avisos.push('Finger-Food permite no máximo 1 fruta.');
        if(frutas > 0 && doces > 1) avisos.push('Se houver fruta no Finger-Food, use no máximo 1 doce e 1 fruta.');
        if(bebidas > 3) avisos.push('Finger-Food permite até 3 tipos de bebidas.');
        if(!itens.includes('Café amargo')) avisos.push('Finger-Food deve incluir Café amargo.');
      }

      if(!pedido.louca.length) avisos.push('Selecione pelo menos 1 tipo de louça.');
      if(!pedido.copos.length) avisos.push('Selecione pelo menos 1 opção de copos/xícaras.');

      return avisos;
    }

    function atualizarRegrasDinamicas(){
      const tipo = document.getElementById('tipoEvento').value;
      const pessoas = Number(document.getElementById('pessoas').value || 0);
      const base = configuracoes[tipo];
      const extra = tipo === 'Coffee-break Simples'
        ? `<li>Para ${pessoas || 0} pessoas, o mínimo atual é de <strong>${Math.max(1, Math.ceil((pessoas || 0) / 10))}</strong> bolo(s), considerando 1 bolo a cada 10 pessoas.</li>`
        : '';

      document.getElementById('regrasDinamicas').innerHTML = `
        <ul class="rule-list">
          <li><strong>${tipo}:</strong> ${base.observacao}</li>
          <li><strong>Louça permitida:</strong> ${base.loucas.join(', ')} (selecione até 2 tipos)</li>
          <li><strong>Copos/Xícaras permitidos:</strong> ${base.copos.join(', ')}${tipo === 'Coquetel' ? ' (selecione até 3 opções)' : ' (selecione até 2 opções)'}</li>
          ${extra}
        </ul>`;
    }

    function montarTextoPedido(){
      const tipoEvento = document.getElementById('tipoEvento').value;
      const responsavelEvento = document.getElementById('responsavelEvento').value.trim() || 'Não informado';
      const pessoas = document.getElementById('pessoas').value || '-';
      const observacoesEvento = document.getElementById('observacoesEvento').value.trim() || 'Nenhuma observação informada.';
      const itens = [...(pedido.itens[tipoEvento] || [])];

      if(tipoEvento === 'Coffee-break Simples' && pedido.substituicaoSimples){
        itens.unshift(pedido.substituicaoSimples);
      }

      return [
        'Novo pedido de coffee break',
        '',
        `Tipo de coffee: ${tipoEvento}`,
        `Responsável pelo evento: ${responsavelEvento}`,
        `Quantidade de pessoas: ${pessoas}`,
        `Louça: ${pedido.louca.length ? pedido.louca.join(', ') : 'Não selecionada'}`,
        `Copos/Xícaras: ${pedido.copos.length ? pedido.copos.join(', ') : 'Não selecionado'}`,
        tipoEvento === 'Coffee-break Simples' ? `Opção principal: ${pedido.substituicaoSimples}` : null,
        `Observações do evento: ${observacoesEvento}`,
        '',
        'Itens selecionados:',
        itens.length ? itens.join(', ') : 'Nenhum item foi selecionado.'
      ].filter(Boolean).join('\n');
    }

    async function carregarImagemBase64(url){
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';

        img.onload = function(){
          try{
            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            resolve(canvas.toDataURL('image/jpeg', 0.85));
          }catch(e){
            resolve(null);
          }
        };

        img.onerror = function(){
          resolve(null);
        };

        img.src = url;
      });
    }

    async function enviarPedido(){
      const tipoEvento = document.getElementById('tipoEvento').value;
      const pessoas = document.getElementById('pessoas').value || '-';
      const avisos = validarTipo(tipoEvento, pessoas);

      if(avisos.length){
        alert('Revise a configuração antes de enviar o pedido.');
        return;
      }

      try{
        await gerarPDFPedido();
      }catch(erro){
        console.error('Erro ao gerar PDF:', erro);
        alert('Não foi possível gerar o PDF automaticamente. O e-mail será aberto mesmo assim.');
      }

      const assunto = encodeURIComponent(`Pedido de ${tipoEvento} - ${document.getElementById('responsavelEvento').value.trim() || 'Sem responsável informado'}`);
      const corpo = encodeURIComponent(montarTextoPedido() + '\n\nSelecione os itens, a louça e os copos.\n\nPDF do pedido gerado automaticamente no navegador.');

      setTimeout(() => {
        window.location.href = `mailto:loreservicos@gmail.com?subject=${assunto}&body=${corpo}`;
      }, 600);
    }

    async function gerarPDFPedido(){
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });

      const tipoEvento = document.getElementById('tipoEvento').value;
      const responsavelEvento = document.getElementById('responsavelEvento').value.trim() || 'Não informado';
      const pessoas = document.getElementById('pessoas').value || '-';
      const observacoesEvento = document.getElementById('observacoesEvento').value.trim() || 'Nenhuma observação informada.';
      const regrasTexto = document.getElementById('regrasDinamicas').innerText || '';

      let itens = [...(pedido.itens[tipoEvento] || [])];
      if(tipoEvento === 'Coffee-break Simples' && pedido.substituicaoSimples){
        itens.unshift(pedido.substituicaoSimples);
      }

      const itensUnicos = [...new Set(itens.map(item => item.trim()))];

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(16);
      doc.text('Lore Serviços', 15, 18);

      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      doc.text(`Gerado em: ${new Date().toLocaleString('pt-BR')}`, 15, 24);

      doc.setDrawColor(64, 169, 235);
      doc.line(15, 27, 195, 27);

      let y = 35;

      const blocoInfo = [
        'Selecione os itens, a louça e os copos.',
        '',
        `Tipo de coffee: ${tipoEvento}`,
        `Responsável pelo evento: ${responsavelEvento}`,
        `Quantidade de pessoas: ${pessoas}`,
        `Louça: ${pedido.louca.length ? pedido.louca.join(', ') : 'Não selecionada'}`,
        `Copos/Xícaras: ${pedido.copos.length ? pedido.copos.join(', ') : 'Não selecionado'}`,
        tipoEvento === 'Coffee-break Simples' ? `Opção principal: ${pedido.substituicaoSimples}` : null,
        `Observações do evento: ${observacoesEvento}`
      ].filter(Boolean);

      doc.setFontSize(11);
      const textoInfo = doc.splitTextToSize(blocoInfo.join('\n'), 180);
      doc.text(textoInfo, 15, y);
      y += (textoInfo.length * 6) + 6;

      doc.setFont('helvetica', 'bold');
      doc.text('Itens selecionados:', 15, y);
      y += 8;

      const cardW = 40;
      const cardH = 32;
      const imgW = 30;
      const imgH = 18;
      const gapX = 5;
      const gapY = 8;
      const startX = 15;
      const maxCols = 4;

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);

      let baseGridY = y;
      let currentPageStartY = y;

      for(let i = 0; i < itensUnicos.length; i++){
        let col = i % maxCols;
        let row = Math.floor(i / maxCols);

        let x = startX + (col * (cardW + gapX));
        let currentY = currentPageStartY + (row * (cardH + gapY));

        if(currentY + cardH > 280){
          doc.addPage();
          currentPageStartY = 20;
          baseGridY = 20;

          const pageIndex = Math.floor(i / (maxCols * 6));
          const indexNaPagina = i - (pageIndex * maxCols * 6);
          col = indexNaPagina % maxCols;
          row = Math.floor(indexNaPagina / maxCols);

          x = startX + (col * (cardW + gapX));
          currentY = currentPageStartY + (row * (cardH + gapY));
        }

        doc.setDrawColor(220, 220, 220);
        doc.roundedRect(x, currentY, cardW, cardH, 3, 3);

        const item = itensUnicos[i];
        const imgUrl = getImageForItem(item);
        const base64 = await carregarImagemBase64(imgUrl);

        if(base64){
          try{
            doc.addImage(base64, 'JPEG', x + 5, currentY + 3, imgW, imgH);
          }catch(e){
            doc.setFontSize(7);
            doc.text('Imagem indisponível', x + 5, currentY + 12);
            doc.setFontSize(8);
          }
        }else{
          doc.setFontSize(7);
          doc.text('Imagem indisponível', x + 5, currentY + 12);
          doc.setFontSize(8);
        }

        const nomeLinhas = doc.splitTextToSize(item, cardW - 6);
        doc.text(nomeLinhas.slice(0, 2), x + 3, currentY + 25);
      }

      let fimGridY = currentPageStartY + (Math.ceil(Math.min(itensUnicos.length, maxCols * 6)) * (cardH + gapY)) + 4;
      if(itensUnicos.length > maxCols * 6){
        fimGridY = 20 + (Math.ceil((itensUnicos.length - (Math.floor((itensUnicos.length - 1) / (maxCols * 6)) * (maxCols * 6))) / maxCols) * (cardH + gapY)) + 4;
      }

      if(fimGridY > 250){
        doc.addPage();
        fimGridY = 20;
      }

      if(regrasTexto){
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(11);
        doc.text('Regras do cardápio:', 15, fimGridY);
        fimGridY += 6;

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(10);
        const regrasLinhas = doc.splitTextToSize(regrasTexto, 180);
        doc.text(regrasLinhas, 15, fimGridY);
      }

      const nomeArquivo = `pedido-${slug(tipoEvento)}-${slug(responsavelEvento || 'sem-responsavel')}.pdf`;
      doc.save(nomeArquivo);
    }

    function gerarResumo(){
      const tipoEvento = document.getElementById('tipoEvento').value;
      const responsavelEvento = document.getElementById('responsavelEvento').value.trim() || 'Não informado';
      const pessoas = document.getElementById('pessoas').value || '-';
      const observacoesEvento = document.getElementById('observacoesEvento').value.trim() || 'Nenhuma observação informada.';
      const itens = [...(pedido.itens[tipoEvento] || [])];

      if(tipoEvento === 'Coffee-break Simples' && pedido.substituicaoSimples){

      const resumoEl = document.getElementById('resumo');

      resumoEl.innerHTML = `
        <strong>Tipo de coffee:</strong> ${tipoEvento}<br>
        <strong>Responsável pelo evento:</strong> ${responsavelEvento}<br>
        <strong>Quantidade de pessoas:</strong> ${pessoas}<br>
        <strong>Louça:</strong> ${pedido.louca.length ? pedido.louca.join(', ') : 'Não selecionada'}<br>
        <strong>Copos/Xícaras:</strong> ${pedido.copos.length ? pedido.copos.join(', ') : 'Não selecionado'}<br>
        ${tipoEvento === 'Coffee-break Simples' ? `<strong>Opção principal:</strong> ${pedido.substituicaoSimples}<br>` : ''}
        <strong>Observações do evento:</strong> ${observacoesEvento}<br><br>
        <strong>Itens selecionados:</strong><br>${itens.length ? itens.join(', ') : 'Nenhum item foi selecionado ainda.'}
      `;

      document.getElementById('validacaoResumo').innerHTML = avisos.length
        ? `<div class="alert"><strong>Ajustes necessários:</strong><br>${avisos.join('<br>')}</div>`
        : `<div class="ok"><strong>Configuração válida.</strong> O cardápio respeita as regras principais desse tipo de serviço.</div>`;

      const btnEnviarPedido = document.getElementById('btnEnviarPedido');
      const btnGerarResumo = document.getElementById('btnGerarResumo');
      const configuracaoValida = avisos.length === 0;

      btnEnviarPedido.classList.toggle('btn-hidden', !configuracaoValida);
      btnGerarResumo.classList.toggle('btn-hidden', configuracaoValida);

      const gallery = document.getElementById('galleryContent');
      if(!itens.length){
        gallery.innerHTML = '<div class="muted">Nenhum item selecionado para mostrar nos cards.</div>';
        return;
      }

      const itensUnicos = [...new Set(itens.map(item => item.trim()))];

      gallery.innerHTML = `<div class="gallery-grid">${itensUnicos.map(item => `
        <div class="gallery-card">
          <img src="${getImageForItem(item)}" alt="${item}" onerror="this.src='${IMAGEM_PADRAO}'">
          <div>${item}</div>
        </div>
      `).join('')}</div>`;
    }

    montarSecoes();
    mudarTipoEvento();
  </script>
</body>
</html>
