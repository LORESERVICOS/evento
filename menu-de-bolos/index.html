<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu de Bolos | Lore Serviços</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#111;
      color:#fff;
      text-align:center;
      min-height:100vh;
      padding:20px;
    }

    .voltar{
      position:fixed;
      top:15px;
      left:15px;
      background:#fff;
      color:#002244;
      padding:10px 15px;
      border-radius:8px;
      text-decoration:none;
      font-weight:bold;
      z-index:1000;
    }

    h1{
      margin:60px 0 20px;
    }

    .galeria{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }

    .galeria img{
      width:100%;
      max-width:900px;
      border-radius:12px;
      box-shadow:0 4px 20px rgba(0,0,0,0.5);
    }

    .controles{
      margin-top:20px;
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .controles button{
      background:#fff;
      color:#002244;
      border:none;
      padding:12px 18px;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    .contador{
      margin-top:15px;
      font-size:16px;
      opacity:0.9;
    }
  </style>
</head>
<body>

  <a href="../" class="voltar">← Voltar</a>

  <h1>Menu de Bolos</h1>

  <div class="galeria">
    <img id="imagemMenu" src="" alt="Menu de Bolos">
    <div class="contador" id="contador"></div>

    <div class="controles">
      <button onclick="anterior()">⬅ Anterior</button>
      <button onclick="proxima()">Próxima ➡</button>
    </div>
  </div>

  <script>
    const imagens = ["https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhxBuEjP-iTUXqqvRwkIsCsjdd3RmvnWr6QtjUUI9rzb7S3p_aBCk_DFRkmxz_PILQYWxYbM0ObXMMPFxRjvV70Vbj2fudHO1us95zwo9xbeo2RiG8atlv4sJg4MEJvWQt45ktZQkhdoRenVMpGaftFrAdAfUurBMqjiJ5nDzhI8tIVV8O8vml-6ETKu_1B/s1366/1.png","https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjpy9Y1hvSPrXWwL1mGa_kK9sue5g0SB8qfwQIrfgX9QpS7hrzUelrMGLe9knHx_-HzEUAMp7sBgkmp178MPSaAdeIS3J7M_pcxvc-vCuQfLGe5x5r_VJWYt7UwZObTFM-tXSBW-RJaTiMRG94jXalFR3GaqLsmoOnx9rR_ZKAuYyp_2X0J6URzcIQy-CL4/s1366/1.png"
      ,"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjaJZjoMyht6muqbdAdC9xCvKNFyxeQvMKZCCB5Wa7lLiUkT-TzRp7dEBgfH5wymk5nNQaUyKbD2uDbjVCVd7K8knfuexjt2RdZ_rXyjL4iDnePU3o5gE75yjm6UdJx6JZ5ImwB50ARhTgc3tjUw-MGZiKlkY4sPXQGnMBO3_N5JYXE7gfQ-purdaF17Nka/s1366/2.jpg"
      ,"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjCYN2G5ZCrsyT-oeRNOcSVf3Fb1zL5GEUZoDiaMn8yTGceD35gVqfpyVJdr17DPiymvnv2p8p69Z7RxkA9AUa8EUhMQ95q6Hi7RyttT1wFF9dqNvuFJ-Cbis8CJI3E24t_4CfBX7WVYQkuqomLU9IW4ApGBGKszxmgvccsm22onZb48Tmhc09JqJPvga0B/s1366/3.jpg"
    ];

    let index = 0;
    const img = document.getElementById("imagemMenu");
    const contador = document.getElementById("contador");

    function mostrarImagem(){
      img.src = imagens[index];
      contador.textContent = `Imagem ${index + 1} de ${imagens.length}`;
    }

    function proxima(){
      index = (index + 1) % imagens.length;
      mostrarImagem();
    }

    function anterior(){
      index = (index - 1 + imagens.length) % imagens.length;
      mostrarImagem();
    }

    mostrarImagem();
  </script>

</body>
</html>
